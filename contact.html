<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Page</title>
</head>
<body>

<!-- HEADER -->
<header>
    <h1>Contact Us</h1>

    <!-- NAVIGATION -->
    <nav>
        <a href="index.html">Home</a> |
        <a href="contact.html">Contact</a>
    </nav>
</header>

<hr>

<!-- MAIN -->
<main>

    <h2>Registration Form</h2>

    <form action="#" method="post">

        <!-- NAME -->
        <label>Full Name:</label><br>
        <input type="text" name="fullname" placeholder="Enter your name" required><br><br>

        <!-- EMAIL -->
        <label>Email:</label><br>
        <input type="email" name="email" placeholder="Enter your email" required><br><br>

        <!-- PASSWORD -->
        <label>Password:</label><br>
        <input type="password" name="password" required><br><br>

        <!-- RADIO BUTTON -->
        <label>Gender:</label><br>
        <input type="radio" name="gender" value="male"> Male<br>
        <input type="radio" name="gender" value="female"> Female<br><br>

        <!-- CHECKBOX -->
        <label>Hobbies:</label><br>
        <input type="checkbox" name="hobby" value="coding"> Coding<br>
        <input type="checkbox" name="hobby" value="music"> Music<br>
        <input type="checkbox" name="hobby" value="sports"> Sports<br><br>

        <!-- SELECT -->
        <label>Country:</label><br>
        <select name="country">
            <option value="nigeria">Nigeria</option>
            <option value="ghana">Ghana</option>
            <option value="kenya">Kenya</option>
        </select><br><br>

        <!-- TEXTAREA -->
        <label>Message:</label><br>
        <textarea name="message" rows="4" cols="30" placeholder="Type your message here"></textarea><br><br>

        <!-- SUBMIT -->
        <input type="submit" value="Submit">

    </form>

</main>

<hr>

<!-- FOOTER -->
<footer>
    <p>Contact Page Footer</p>
</footer>

</body>
</html>
